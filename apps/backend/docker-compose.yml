services:
  db:
    image: postgres:15-alpine
    container_name: adyuta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: adyuta
    ports:
      - "5432:5432"
    volumes:
      - adyuta-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: adyuta-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - adyuta-redis-data:/data

volumes:
  adyuta-db-data:
  adyuta-redis-data:
